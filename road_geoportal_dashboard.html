<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyamata Roads — Complete Network with Labels | Bugesera District</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #eff2f7;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --border: #e5e7eb;
            --text: #111827;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --radius: 22px;
            --small-radius: 14px;
            --font: 'Inter', system-ui, sans-serif;
            --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.06);
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 28px;
            height: 72px;
            background: var(--surface);
            border-bottom: 1px solid #e7eaf1;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            flex-shrink: 0;
            z-index: 20;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text);
            white-space: nowrap;
        }
        .logo-badge {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 14px 32px rgba(37, 99, 235, 0.18);
            flex-shrink: 0;
        }
        .search-box {
            flex: 1;
            max-width: 520px;
            position: relative;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            height: 46px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: var(--surface-alt);
            padding: 0 110px 0 46px;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        .search-box .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
            pointer-events: none;
        }
        .search-box .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 6px 18px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            height: 36px;
            line-height: 1;
            z-index: 5;
        }
        .search-box .search-btn:hover {
            background: #1d4ed8;
        }
        .search-results {
            position: absolute;
            top: 54px;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            max-height: 340px;
            overflow-y: auto;
            z-index: 9999 !important;
            display: none;
            box-shadow: var(--shadow-soft);
        }
        .result-item {
            padding: 12px 18px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }
        .result-item:hover {
            background: #f1f5f9;
        }
        .result-item .badge {
            background: #e5e7eb;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-left: auto;
            flex-shrink: 0;
        }
        .result-item .road-preview {
            font-weight: 500;
        }
        .topbar-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            border: 1px solid #d1d5db;
            background: var(--surface-alt);
            cursor: pointer;
            transition: all 0.18s ease;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            white-space: nowrap;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
            background: var(--surface);
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .sidebar {
            width: 70px;
            background: var(--surface);
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 0;
            gap: 12px;
            box-shadow: inset -1px 0 0 rgba(15, 23, 42, 0.05);
            flex-shrink: 0;
        }
        .side-icon {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            background: #f8fafc;
            transition: all 0.2s ease;
        }
        .side-icon:hover,
        .side-icon.active {
            background: var(--primary-soft);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
        }
        #map {
            flex: 1;
            background: #e8eef8;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }
        .info-panel {
            width: 360px;
            background: var(--surface);
            border-left: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s ease, transform 0.2s ease;
            box-shadow: -10px 0 30px rgba(15, 23, 42, 0.06);
            flex-shrink: 0;
        }
        .info-panel.collapsed {
            width: 0;
            transform: translateX(100%);
            border: none;
            overflow: hidden;
        }
        .panel-tabs {
            display: flex;
            gap: 10px;
            padding: 18px;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 12px 0;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            background: #f8fafc;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-muted);
            transition: background 0.2s, color 0.2s;
        }
        .tab.active {
            color: var(--primary);
            background: #eff6ff;
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface-alt);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
        }
        .stat-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: block;
        }
        .stat-value {
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1.1;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.84rem;
            margin: 12px 0;
            color: var(--text-muted);
        }
        .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 999px;
            flex-shrink: 0;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 14px;
            border-radius: 999px;
            background: var(--surface-alt);
            border: 1px solid #e5e7eb;
            font-size: 0.78rem;
            cursor: pointer;
            margin: 4px 4px 0 0;
            transition: all 0.15s ease;
            color: var(--text);
        }
        .filter-chip.active {
            background: var(--primary-soft);
            border-color: rgba(37, 99, 235, 0.35);
            color: var(--primary);
        }
        .filter-chip:hover {
            background: var(--primary-soft);
            border-color: rgba(37, 99, 235, 0.2);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: white;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 0.82rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            opacity: 1;
        }
        .map-status {
            position: absolute;
            bottom: 18px;
            left: 18px;
            background: rgba(255, 255, 255, 0.96);
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-family: Inter, sans-serif;
            z-index: 500;
            border: 1px solid #e5e7eb;
            box-shadow: var(--shadow-soft);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .road-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.96);
            color: #111827;
            padding: 3px 10px;
            border-radius: 16px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
            pointer-events: none;
            letter-spacing: 0.2px;
            border-left-width: 3px;
            border-left-style: solid;
        }
        .layer-control-group {
            margin-top: 12px;
        }
        .layer-control-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .layer-control-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .panel-section-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            display: block;
        }
        .panel-divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 18px 0;
        }

        @media (max-width: 820px) {
            .topbar {
                padding: 0 14px;
                gap: 10px;
                flex-wrap: wrap;
                height: auto;
                min-height: 64px;
                padding-top: 8px;
                padding-bottom: 8px;
            }
            .logo span {
                font-size: 0.85rem;
            }
            .search-box {
                max-width: 100%;
                min-width: 120px;
                order: 10;
                flex-basis: 100%;
            }
            .search-box input {
                padding: 0 100px 0 40px;
                height: 40px;
                font-size: 0.85rem;
            }
            .search-box .search-btn {
                right: 4px;
                padding: 4px 14px;
                font-size: 0.75rem;
                height: 32px;
            }
            .topbar-actions .btn {
                font-size: 0.7rem;
                padding: 6px 12px;
                min-height: 34px;
            }
            .sidebar {
                width: 52px;
                padding: 10px 0;
            }
            .side-icon {
                width: 38px;
                height: 38px;
                font-size: 15px;
            }
            .info-panel {
                width: 280px;
            }
            .info-panel.collapsed {
                width: 0;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .stat-card {
                padding: 14px;
            }
            .stat-value {
                font-size: 1.3rem;
            }
            .panel-content {
                padding: 16px;
            }
            .map-status {
                font-size: 0.7rem;
                padding: 6px 12px;
                bottom: 10px;
                left: 10px;
            }
            .road-label {
                font-size: 8px;
                padding: 2px 7px;
            }
        }

        @media (max-width: 480px) {
            .topbar-actions .btn:not(.btn-primary) {
                display: none;
            }
            .topbar-actions .btn-primary {
                font-size: 0.7rem;
                padding: 6px 10px;
                min-height: 30px;
            }
            .info-panel {
                width: 240px;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-value {
                font-size: 1.1rem;
            }
            .panel-tabs .tab {
                font-size: 0.7rem;
                padding: 8px 0;
            }
            .search-box input {
                height: 38px;
                font-size: 0.8rem;
                padding: 0 90px 0 36px;
            }
            .search-box .search-icon {
                left: 12px;
                font-size: 12px;
            }
            .search-box .search-btn {
                font-size: 0.7rem;
                padding: 4px 10px;
                height: 28px;
            }
            .search-results {
                top: 44px;
                max-height: 200px;
            }
            .result-item {
                padding: 10px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo" onclick="fitNyamataBounds()">
            <div class="logo-badge">🛣️</div>
            <span>Nyamata Roads · Bugesera</span>
        </div>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search ROAD_NO, class…" autocomplete="off" />
            <button class="search-btn" id="searchButton">Search</button>
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="topbar-actions">
            <button class="btn" onclick="locateMe()">📍 Locate</button>
            <button class="btn btn-primary" onclick="exportGeoJSON()">📥 Export</button>
            <button class="btn" onclick="toggleLabels()" id="toggleLabelsBtn">🏷️ Hide Labels</button>
            <button class="btn" onclick="togglePanel()">📋</button>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <div class="side-icon" onclick="switchTab('overview')">📊</div>
            <div class="side-icon" onclick="switchTab('layers')">🗺️</div>
            <div class="side-icon" onclick="switchTab('filters')">⚙️</div>
            <div class="side-icon" onclick="fitNyamataBounds()">🎯</div>
        </div>
        <div id="map"></div>
        <div class="info-panel" id="infoPanel">
            <div class="panel-tabs">
                <button class="tab active" onclick="switchTab('overview')">Overview</button>
                <button class="tab" onclick="switchTab('layers')">Layers</button>
                <button class="tab" onclick="switchTab('filters')">Filters</button>
            </div>
            <div class="panel-content" id="panelContent"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================================
        //  NYAMATA ROADS — COMPLETE NETWORK WITH SEARCH BUTTON
        //  Debug logs enabled — check browser console (F12)
        // ============================================================

        let allRoadsData = null;
        let boundaryData = null;
        let map, roadLayer, labelLayerGroup, boundaryLayer;
        let currentFilters = { class: null, status: null };
        let showBoundaries = true;
        let activeBasemapLayer;
        let totalFeatures = 0;
        let showLabels = true;
        let highlightLayer = null;

        // ---- helpers ----
        function getRoadColor(props) {
            const status = props.Status;
            const roadClass = props.Class;
            if (status === 'Paved') return '#2b7e5a';
            if (roadClass === 'National Road') return '#d97706';
            if (roadClass && roadClass.includes('District Road Class 1')) return '#8b5cf6';
            if (roadClass && roadClass.includes('District')) return '#b45309';
            if (roadClass === 'Added Link') return '#3b82f6';
            return '#6b7280';
        }

        function getRoadWeight(props) {
            if (props.Class === 'National Road') return 4;
            if (props.Class && props.Class.includes('District Road Class 1')) return 3;
            if (props.Class === 'Other road') return 2;
            return 2;
        }

        function getLabelPosition(coordinates) {
            if (!coordinates || coordinates.length === 0) return null;
            const mid = Math.floor(coordinates.length / 2);
            return coordinates[mid];
        }

        // ---- group road segments by ROAD_NO ----
        function groupRoadSegments(featureCollection) {
            if (!featureCollection || !Array.isArray(featureCollection.features)) return featureCollection;
            const groups = {};

            featureCollection.features.forEach(feature => {
                const props = feature.properties || {};
                const roadNoValue = String(props.ROAD_NO || '').trim();
                const roadNo = roadNoValue || `UNNAMED_${props.OBJECTID || Math.random().toString(36).slice(2)}`;
                if (!groups[roadNo]) {
                    groups[roadNo] = {
                        properties: { ...props, ROAD_NO: roadNoValue || 'Unnamed' },
                        geometries: [],
                        id: roadNo
                    };
                }
                const geom = feature.geometry;
                if (!geom || !geom.coordinates) return;
                if (geom.type === 'LineString') {
                    groups[roadNo].geometries.push(geom.coordinates);
                } else if (geom.type === 'MultiLineString') {
                    geom.coordinates.forEach(line => groups[roadNo].geometries.push(line));
                }
            });

            const groupedFeatures = Object.values(groups).map(group => {
                const geometry = group.geometries.length === 1 ?
                    { type: 'LineString', coordinates: group.geometries[0] } :
                    { type: 'MultiLineString', coordinates: group.geometries };
                return {
                    type: 'Feature',
                    id: group.id,
                    properties: { ...group.properties, segment_count: group.geometries.length },
                    geometry
                };
            });

            return { type: 'FeatureCollection', features: groupedFeatures };
        }

        // ---- render roads ----
        function renderRoads() {
            if (!allRoadsData || !map) return;
            if (roadLayer) map.removeLayer(roadLayer);
            if (labelLayerGroup) map.removeLayer(labelLayerGroup);
            if (highlightLayer) { map.removeLayer(highlightLayer);
                highlightLayer = null; }

            const filtered = allRoadsData.features.filter(f => {
                const props = f.properties;
                if (currentFilters.class && props.Class !== currentFilters.class) return false;
                if (currentFilters.status && props.Status !== currentFilters.status) return false;
                return true;
            });

            const geoJsonLayer = L.geoJSON({ type: "FeatureCollection", features: filtered }, {
                style: (feature) => ({
                    color: getRoadColor(feature.properties),
                    weight: getRoadWeight(feature.properties),
                    opacity: 0.85,
                    lineCap: 'round',
                    lineJoin: 'round'
                }),
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    const popupHtml = `
                <div style="min-width:200px;font-family:Inter;">
                  <strong style="font-size:14px;">${p.ROAD_NO || 'Unnamed Road'}</strong><br>
                  <span style="color:#666;">${p.Class || '—'}</span><br>
                  <span>Status: ${p.Status || '—'}</span><br>
                  <span>District: ${p.District || 'Bugesera'}</span>
                  ${p.Shape_Length ? `<span>Length: ${(p.Shape_Length/1000).toFixed(2)} km</span>` : ''}
                </div>
              `;
                    layer.bindPopup(popupHtml);
                }
            });

            roadLayer = geoJsonLayer.addTo(map);

            // labels
            labelLayerGroup = L.layerGroup();
            filtered.forEach(feature => {
                const props = feature.properties;
                const roadNo = props.ROAD_NO;
                if (!roadNo || roadNo === ' ' || roadNo === '') return;
                let geometry = feature.geometry;
                let coords = null;
                if (geometry.type === 'LineString') {
                    coords = geometry.coordinates.map(c => [c[1], c[0]]);
                } else if (geometry.type === 'MultiLineString') {
                    let longest = geometry.coordinates.reduce((a, b) => a.length > b.length ? a : b);
                    coords = longest.map(c => [c[1], c[0]]);
                }
                if (coords && coords.length > 0) {
                    const labelPos = getLabelPosition(coords);
                    if (labelPos) {
                        const color = getRoadColor(props);
                        const marker = L.marker(labelPos, {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div class="road-label" style="border-left-color:${color};">${roadNo}</div>`,
                                iconSize: null,
                                popupAnchor: [0, -10]
                            }),
                            interactive: false
                        });
                        labelLayerGroup.addLayer(marker);
                    }
                }
            });

            if (showLabels) labelLayerGroup.addTo(map);
            updateStatusCount(filtered.length);
        }

        function updateStatusCount(count) {
            let el = document.getElementById('mapStatus');
            if (!el) {
                el = document.createElement('div');
                el.id = 'mapStatus';
                el.className = 'map-status';
                document.querySelector('#map').appendChild(el);
            }
            el.innerHTML =
                `🛣️ ${count} / ${totalFeatures} roads visible · 🏷️ Labels: ${showLabels ? 'ON' : 'OFF'}`;
        }

        // ---- load data ----
        function loadRoadData() {
            showToast('Loading Nyamata roads…');
            try {
                const raw = JSON.parse(document.getElementById('embeddedRoadData').textContent);
                allRoadsData = groupRoadSegments(raw);
                totalFeatures = allRoadsData.features.length;
                renderRoads();
                updateStats();
                showToast(`Loaded ${totalFeatures} road segments`);
                console.log('✅ Road data loaded, total features:', totalFeatures);
            } catch (e) {
                console.error('❌ Road data error:', e);
                showToast('Error loading road data — using fallback');
                loadFallbackRoadData();
            }
        }

        function loadFallbackRoadData() {
            const fallback = {
                type: 'FeatureCollection',
                features: []
            };
            const sample = [
                { id: 1, road: 'BNY001 RD', coords: [
                        [30.05737, -2.16275],
                        [30.05743, -2.16258],
                        [30.05748, -2.16242],
                        [30.05759, -2.16235],
                        [30.05791, -2.16226],
                        [30.05815, -2.16220],
                        [30.05827, -2.16223],
                        [30.05850, -2.16248],
                        [30.05889, -2.16291],
                        [30.05918, -2.16331],
                        [30.05955, -2.16370],
                        [30.05984, -2.16414],
                        [30.06010, -2.16446],
                        [30.06019, -2.16456]
                    ], cls: 'Other road', status: 'Unpaved' },
                { id: 2, road: 'NR 5', coords: [
                        [30.09977, -2.15441],
                        [30.09945, -2.15400],
                        [30.09909, -2.15357],
                        [30.09888, -2.15331],
                        [30.09846, -2.15280],
                        [30.09839, -2.15272],
                        [30.09804, -2.15229],
                        [30.09764, -2.15181]
                    ], cls: 'National Road', status: 'Paved' },
                { id: 3, road: 'DR 73', coords: [
                        [30.09908, -2.14443],
                        [30.09916, -2.14446],
                        [30.09969, -2.14450]
                    ], cls: 'District Road Class 1', status: 'Unpaved' },
                { id: 4, road: 'EB41', coords: [
                        [30.11683, -2.13611],
                        [30.11639, -2.13604],
                        [30.11579, -2.13601],
                        [30.11503, -2.13581],
                        [30.11381, -2.13553],
                        [30.11333, -2.13533],
                        [30.11306, -2.13516],
                        [30.11287, -2.13492]
                    ], cls: 'Draft District Road Class 2', status: 'Unpaved' }
            ];
            sample.forEach(r => {
                fallback.features.push({
                    type: 'Feature',
                    id: r.id,
                    geometry: { type: 'LineString', coordinates: r.coords.map(c => [c[0], c[1], 0]) },
                    properties: { ROAD_NO: r.road, Class: r.cls, Status: r.status, District: 'Bugesera' }
                });
            });
            allRoadsData = groupRoadSegments(fallback);
            totalFeatures = allRoadsData.features.length;
            renderRoads();
            updateStats();
            console.log('⚠️ Using fallback data, total features:', totalFeatures);
        }

        function loadBoundaryData() {
            try {
                const data = JSON.parse(document.getElementById('embeddedBoundaryData').textContent);
                boundaryData = data;
                if (boundaryLayer) map.removeLayer(boundaryLayer);
                boundaryLayer = L.geoJSON(boundaryData, {
                    style: {
                        color: '#1f2937',
                        weight: 2,
                        opacity: 0.75,
                        fillColor: '#f8fafc',
                        fillOpacity: 0.12,
                        dashArray: '6 4'
                    },
                    onEachFeature: (f, layer) => {
                        const p = f.properties || {};
                        const name = p.Sector || p.sector || 'Nyamata Sector';
                        layer.bindPopup(`<strong>${name}</strong>`);
                    }
                });
                if (showBoundaries) boundaryLayer.addTo(map);
            } catch (e) {
                console.warn('Boundary data not loaded');
            }
        }

        // ---- stats ----
        function updateStats() {
            const total = totalFeatures;
            const paved = allRoadsData.features.filter(f => f.properties.Status === 'Paved').length;
            const national = allRoadsData.features.filter(f => f.properties.Class === 'National Road').length;
            const district = allRoadsData.features.filter(f => f.properties.Class && f.properties.Class.includes('District'))
                .length;

            document.getElementById('panelContent').innerHTML = `
            <div class="stat-grid">
              <div class="stat-card"><div class="stat-label">Total roads</div><div class="stat-value">${total}</div></div>
              <div class="stat-card"><div class="stat-label">Paved</div><div class="stat-value">${paved}</div></div>
              <div class="stat-card"><div class="stat-label">National</div><div class="stat-value">${national}</div></div>
              <div class="stat-card"><div class="stat-label">District</div><div class="stat-value">${district}</div></div>
            </div>
            <div class="legend">
              <div class="legend-item"><div class="legend-color" style="background:#2b7e5a;"></div> Paved roads</div>
              <div class="legend-item"><div class="legend-color" style="background:#d97706;"></div> National roads</div>
              <div class="legend-item"><div class="legend-color" style="background:#8b5cf6;"></div> District Class 1</div>
              <div class="legend-item"><div class="legend-color" style="background:#b45309;"></div> Other district</div>
              <div class="legend-item"><div class="legend-color" style="background:#3b82f6;"></div> Added links</div>
              <div class="legend-item"><div class="legend-color" style="background:#6b7280;"></div> Other roads</div>
            </div>
          `;
        }

        // ---- SEARCH with button + auto-zoom ----
        function setupSearch() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            const searchBtn = document.getElementById('searchButton');

            console.log('🔧 Search setup initialized');

            function performSearch(query, autoZoom = false) {
                console.log(`🔎 performSearch() called with query: "${query}", autoZoom: ${autoZoom}`);
                const q = query.trim().toLowerCase();
                if (q.length < 2) {
                    resultsDiv.style.display = 'none';
                    console.log('⏹️ Query too short, hiding results');
                    return;
                }
                if (!allRoadsData) {
                    console.warn('⚠️ allRoadsData not loaded yet');
                    showToast('Road data not loaded yet');
                    return;
                }

                console.log(`📊 Total features in allRoadsData: ${allRoadsData.features.length}`);
                if (allRoadsData.features.length > 0) {
                    const sample = allRoadsData.features.slice(0, 3).map(f => f.properties.ROAD_NO);
                    console.log('📋 Sample ROAD_NO values:', sample);
                }

                const matches = allRoadsData.features.filter(f => {
                    const road = (f.properties.ROAD_NO || '').toLowerCase();
                    const cls = (f.properties.Class || '').toLowerCase();
                    return road.includes(q) || cls.includes(q);
                });

                console.log(`🔍 Found ${matches.length} matches for "${q}"`);

                if (matches.length === 0) {
                    resultsDiv.innerHTML = `<div class="result-item" style="color:#999;cursor:default;">No results found</div>`;
                    resultsDiv.style.display = 'block';
                    return;
                }

                // If autoZoom is true (Search button or Enter), zoom to first match
                if (autoZoom) {
                    const firstMatch = matches[0];
                    const roadNo = firstMatch.properties.ROAD_NO || '';
                    zoomToFeature(firstMatch);
                    resultsDiv.style.display = 'none';
                    input.value = roadNo;
                    console.log(`📍 Auto-zoomed to: ${roadNo}`);
                    showToast(`📍 Found: ${roadNo}`);
                    return;
                }

                // Otherwise show dropdown (typing)
                const topMatches = matches.slice(0, 12);
                resultsDiv.innerHTML = topMatches.map(f => `
                    <div class="result-item" data-road="${f.properties.ROAD_NO || ''}">
                        <span>🏷️ ${f.properties.ROAD_NO || 'Unnamed'}</span>
                        <span class="badge">${f.properties.Class || '—'}</span>
                    </div>
                `).join('');

                resultsDiv.style.display = 'block';
                console.log('✅ Results displayed');

                // Click on a result zooms to that specific road
                resultsDiv.querySelectorAll('.result-item').forEach(el => {
                    el.addEventListener('click', function(e) {
                        const roadNo = this.dataset.road;
                        if (!roadNo) return;
                        const feature = allRoadsData.features.find(f => f.properties.ROAD_NO === roadNo);
                        if (feature) {
                            zoomToFeature(feature);
                            resultsDiv.style.display = 'none';
                            input.value = roadNo;
                            console.log(`📍 Zoomed to: ${roadNo}`);
                            showToast(`📍 Found: ${roadNo}`);
                        } else {
                            console.warn(`⚠️ Feature not found for road: ${roadNo}`);
                        }
                    });
                });
            }

            // Input events (typing → dropdown, no auto-zoom)
            input.addEventListener('input', function(e) {
                const val = this.value;
                if (val.length >= 2) performSearch(val, false);
                else resultsDiv.style.display = 'none';
            });

            // Enter key → auto-zoom
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch(this.value, true);
                }
                if (e.key === 'Escape') {
                    resultsDiv.style.display = 'none';
                    this.blur();
                }
            });

            // Search button → auto-zoom
            searchBtn.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('🖱️ Search button clicked!');
                performSearch(input.value, true);
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-box')) {
                    resultsDiv.style.display = 'none';
                }
            });

            console.log('✅ Search setup complete!');
        }

        // ---- zoom to feature ----
        function zoomToFeature(feature) {
            if (!feature || !feature.geometry) return;
            const geom = feature.geometry;
            let allCoords = [];
            if (geom.type === 'LineString') {
                allCoords = geom.coordinates.map(c => [c[1], c[0]]);
            } else if (geom.type === 'MultiLineString') {
                geom.coordinates.forEach(line => {
                    line.forEach(c => allCoords.push([c[1], c[0]]));
                });
            }
            if (allCoords.length === 0) return;
            const bounds = L.latLngBounds(allCoords);
            map.fitBounds(bounds, { padding: [60, 60], maxZoom: 16 });

            // Highlight
            if (highlightLayer) map.removeLayer(highlightLayer);
            highlightLayer = L.geoJSON({ type: 'Feature', ...feature }, {
                style: {
                    color: '#2563eb',
                    weight: 6,
                    opacity: 0.9,
                    lineCap: 'round'
                }
            }).addTo(map);
            setTimeout(() => {
                if (highlightLayer) { map.removeLayer(highlightLayer);
                    highlightLayer = null; }
            }, 4000);
        }

        // ---- UI controls ----
        function toggleLabels() {
            showLabels = !showLabels;
            const btn = document.getElementById('toggleLabelsBtn');
            if (showLabels) {
                if (labelLayerGroup) labelLayerGroup.addTo(map);
                btn.innerHTML = '🏷️ Hide Labels';
                btn.style.background = '';
            } else {
                if (labelLayerGroup) map.removeLayer(labelLayerGroup);
                btn.innerHTML = '🏷️ Show Labels';
                btn.style.background = '#e5f4ed';
            }
            updateStatusCount(roadLayer ? roadLayer.getLayers().length : 0);
            showToast(`Labels ${showLabels ? 'shown' : 'hidden'}`);
        }

        function togglePanel() {
            document.getElementById('infoPanel').classList.toggle('collapsed');
            setTimeout(() => map.invalidateSize(), 200);
        }

        function fitNyamataBounds() {
            const bounds = L.latLngBounds([[-2.22, 30.00], [-2.08, 30.18]]);
            map.fitBounds(bounds);
            showToast('Zoomed to Nyamata');
        }

        function locateMe() {
            if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
            navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
                    radius: 8,
                    color: '#2563eb',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.7
                }).addTo(map).bindPopup('📍 You are here').openPopup();
                showToast('Centered on your location');
            }, () => showToast('Location access denied'));
        }

        function exportGeoJSON() {
            if (!allRoadsData) { showToast('No data to export'); return; }
            const data = JSON.stringify(allRoadsData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nyamata_roads_complete.geojson';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported complete road network');
        }

        function setBasemap(type) {
            if (activeBasemapLayer) map.removeLayer(activeBasemapLayer);
            if (type === 'satellite') {
                activeBasemapLayer = L.tileLayer(
                    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Esri'
                    }).addTo(map);
            } else {
                activeBasemapLayer = L.tileLayer(
                    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '© CartoDB, OSM'
                    }).addTo(map);
            }
            showToast(`Basemap: ${type}`);
        }

        function toggleRoadVisibility() {
            const chk = document.getElementById('toggleRoads');
            if (chk && chk.checked) {
                renderRoads();
            } else if (roadLayer) {
                map.removeLayer(roadLayer);
                if (labelLayerGroup) map.removeLayer(labelLayerGroup);
                updateStatusCount(0);
            }
        }

        function toggleBoundaries() {
            showBoundaries = !showBoundaries;
            if (showBoundaries) { if (boundaryLayer) boundaryLayer.addTo(map); } else { if (boundaryLayer) map.removeLayer(
                    boundaryLayer); }
            const cb = document.getElementById('toggleBoundaries');
            if (cb) cb.checked = showBoundaries;
            showToast(`Boundary ${showBoundaries ? 'shown' : 'hidden'}`);
        }

        function clearFilters() {
            currentFilters = { class: null, status: null };
            renderRoads();
            switchTab('filters');
            showToast('Filters cleared');
        }

        // ---- switchTab ----
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.side-icon').forEach(i => i.classList.remove('active'));
            const activeTab = Array.from(document.querySelectorAll('.tab')).find(t =>
                t.innerText.toLowerCase().includes(tabName)
            );
            if (activeTab) activeTab.classList.add('active');

            if (tabName === 'overview') {
                updateStats();
            } else if (tabName === 'layers') {
                document.getElementById('panelContent').innerHTML = `
              <span class="panel-section-title">🗺️ Basemap</span>
              <button class="btn" style="width:100%;margin-bottom:8px;" onclick="setBasemap('streets')">🗺️ Streets</button>
              <button class="btn" style="width:100%;margin-bottom:16px;" onclick="setBasemap('satellite')">🛰️ Satellite</button>
              <hr class="panel-divider"/>
              <span class="panel-section-title">👁️ Visibility</span>
              <div class="layer-control-group">
                <label><input type="checkbox" checked id="toggleRoads" onchange="toggleRoadVisibility()"> 🛣️ Show roads</label>
                <label><input type="checkbox" ${showLabels ? 'checked' : ''} id="toggleLabelsCheck" onchange="toggleLabels()"> 🏷️ Show ROAD_NO labels</label>
                <label><input type="checkbox" checked id="toggleBoundaries" onchange="toggleBoundaries()"> 🧭 Sector boundary</label>
              </div>
            `;
                document.getElementById('toggleLabelsCheck').checked = showLabels;
            } else if (tabName === 'filters') {
                const classes = [...new Set(allRoadsData.features.map(f => f.properties.Class).filter(Boolean))];
                const statuses = [...new Set(allRoadsData.features.map(f => f.properties.Status).filter(Boolean))];
                document.getElementById('panelContent').innerHTML = `
              <span class="panel-section-title">🔍 Filter by class</span>
              <div>${classes.map(c => `<span class="filter-chip ${currentFilters.class === c ? 'active' : ''}" data-filter="class" data-value="${c}">${c}</span>`).join('')}</div>
              <hr class="panel-divider"/>
              <span class="panel-section-title">🔍 Filter by status</span>
              <div>${statuses.map(s => `<span class="filter-chip ${currentFilters.status === s ? 'active' : ''}" data-filter="status" data-value="${s}">${s}</span>`).join('')}</div>
              <button class="btn" style="width:100%;margin-top:20px;" onclick="clearFilters()">Reset filters</button>
            `;
                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const type = chip.dataset.filter;
                        const val = chip.dataset.value;
                        if (type === 'class') currentFilters.class = currentFilters.class === val ? null : val;
                        if (type === 'status') currentFilters.status = currentFilters.status === val ? null :
                            val;
                        renderRoads();
                        switchTab('filters');
                    });
                });
            }
        }

        // ---- toast ----
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2600);
        }

        // ---- init map ----
        function initMap() {
            console.log('🗺️ Initializing map...');
            map = L.map('map').setView([-2.145, 30.085], 12);
            activeBasemapLayer = L.tileLayer(
                'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© CartoDB, OSM'
                }).addTo(map);

            loadBoundaryData();
            loadRoadData();
            setupSearch();

            window.addEventListener('resize', () => map.invalidateSize());
            console.log('✅ Map initialized');
        }

        // ---- expose globals ----
        window.initMap = initMap;
        window.switchTab = switchTab;
        window.togglePanel = togglePanel;
        window.setBasemap = setBasemap;
        window.toggleRoadVisibility = toggleRoadVisibility;
        window.toggleLabels = toggleLabels;
        window.toggleBoundaries = toggleBoundaries;
        window.clearFilters = clearFilters;
        window.locateMe = locateMe;
        window.fitNyamataBounds = fitNyamataBounds;
        window.exportGeoJSON = exportGeoJSON;
        window.zoomToFeature = zoomToFeature;

        // Debug helper: expose search to console
        window.debugSearch = function(query) {
            console.log(`🧪 Manual testSearch("${query}")`);
            const input = document.getElementById('searchInput');
            if (input) {
                input.value = query;
                // Trigger the search with auto-zoom
                const searchBtn = document.getElementById('searchButton');
                if (searchBtn) searchBtn.click();
            } else {
                console.warn('Input element not found');
            }
        };

        window.addEventListener('load', function() {
            console.log('✅ Debug mode enabled!');
            console.log('💡 Try: debugSearch("BNY") or debugSearch("NR 5")');
            console.log('💡 Or type in the search box and click the Search button');
            console.log('💡 Check the console for detailed debug logs');
            initMap();
        });
    </script>

</body>
</html>
