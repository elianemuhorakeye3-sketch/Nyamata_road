<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyamata Roads - Complete Network with Labels | Bugesera District</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #eff2f7;
    --surface: #ffffff;
    --surface-alt: #f8fafc;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --primary: #2563eb;
    --primary-soft: #eff6ff;
    --danger: #ef4444;
    --success: #16a34a;
    --radius: 22px;
    --small-radius: 14px;
    --font: 'Inter', system-ui, sans-serif;
    --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
    --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.06);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 20px; padding: 0 28px; height: 72px; background: var(--surface); border-bottom: 1px solid #e7eaf1; box-shadow: 0 10px 30px rgba(15,23,42,0.06); flex-shrink: 0; z-index: 20; }
  .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; color: var(--text); }
  .logo-badge { width: 40px; height: 40px; background: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; box-shadow: 0 14px 32px rgba(37,99,235,0.18); }
  .search-box { flex: 1; max-width: 440px; position: relative; }
  .search-box input { width: 100%; height: 46px; border-radius: 999px; border: 1px solid #d1d5db; background: var(--surface-alt); padding: 0 18px 0 46px; font-size: 0.95rem; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
  .search-box .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); }
  .search-results { position: absolute; top: 54px; left: 0; right: 0; background: var(--surface); border: 1px solid #e5e7eb; border-radius: 18px; max-height: 320px; overflow-y: auto; z-index: 1000; display: none; box-shadow: var(--shadow-soft); }
  .result-item { padding: 14px 18px; font-size: 0.92rem; border-bottom: 1px solid #f3f4f6; cursor: pointer; color: var(--text); }
  .result-item:hover { background: #f8fafc; }
  .topbar-actions { display: flex; gap: 10px; margin-left: auto; }
  .btn { padding: 10px 18px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; border: 1px solid #d1d5db; background: var(--surface-alt); cursor: pointer; transition: all 0.18s ease; color: var(--text); display: inline-flex; align-items: center; gap: 8px; min-height: 44px; }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); background: var(--surface); }
  .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
  .sidebar { width: 70px; background: var(--surface); border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 18px 0; gap: 12px; box-shadow: inset -1px 0 0 rgba(15,23,42,0.05); }
  .side-icon { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; font-size: 18px; color: var(--text-muted); background: #f8fafc; transition: all 0.2s ease; }
  .side-icon:hover, .side-icon.active { background: var(--primary-soft); color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-soft); }
  #map { flex: 1; background: #e8eef8; min-height: 0; position: relative; overflow: hidden; }
  .info-panel { width: 360px; background: var(--surface); border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s ease, transform 0.2s ease; box-shadow: -10px 0 30px rgba(15,23,42,0.06); }
  .info-panel.collapsed { width: 0; transform: translateX(100%); border: none; }
  .panel-tabs { display: flex; gap: 10px; padding: 18px; }
  .tab { flex: 1; padding: 12px 0; font-size: 0.82rem; font-weight: 700; text-align: center; background: #f8fafc; border: none; border-radius: 14px; cursor: pointer; color: var(--text-muted); transition: background 0.2s, color 0.2s; }
  .tab.active { color: var(--primary); background: #eff6ff; }
  .panel-content { flex: 1; overflow-y: auto; padding: 24px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface-alt); border-radius: 24px; padding: 20px; border: 1px solid #e5e7eb; box-shadow: inset 0 1px 0 rgba(255,255,255,0.68); }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 10px; display: block; }
  .stat-value { font-size: 1.7rem; font-weight: 800; line-height: 1.1; }
  .legend-item { display: flex; align-items: center; gap: 12px; font-size: 0.84rem; margin: 12px 0; color: var(--text-muted); }
  .legend-color { width: 24px; height: 4px; border-radius: 999px; }
  .filter-chip { display: inline-flex; align-items: center; justify-content: center; padding: 9px 14px; border-radius: 999px; background: var(--surface-alt); border: 1px solid #e5e7eb; font-size: 0.8rem; cursor: pointer; margin: 4px 4px 0 0; transition: all 0.15s ease; color: var(--text); }
  .filter-chip.active { background: var(--primary-soft); border-color: rgba(37,99,235,0.35); color: var(--primary); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 10px 18px; border-radius: 999px; font-size: 0.82rem; z-index: 2000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .map-status { position: absolute; bottom: 18px; left: 18px; background: rgba(255,255,255,0.96); padding: 10px 16px; border-radius: 999px; font-size: 0.82rem; font-family: Inter, sans-serif; z-index: 500; border: 1px solid #e5e7eb; box-shadow: var(--shadow-soft); }
  .road-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; background: rgba(255, 255, 255, 0.96); color: #111827; padding: 4px 10px; border-radius: 16px; border: 1px solid rgba(15,23,42,0.08); white-space: nowrap; box-shadow: 0 12px 28px rgba(15,23,42,0.12); pointer-events: none; letter-spacing: 0.2px; }
  .road-label:hover { background: white; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="fitNyamataBounds()">
    <div class="logo-badge">🛣️</div>
    <span>Nyamata Roads · Bugesera</span>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search ROAD_NO, class...">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="topbar-actions">
    <button class="btn" onclick="locateMe()">📍 Locate</button>
    <button class="btn btn-primary" onclick="exportGeoJSON()">📥 Export</button>
    <button class="btn" onclick="toggleLabels()" id="toggleLabelsBtn">🏷️ Hide Labels</button>
    <button class="btn" onclick="togglePanel()">📋</button>
  </div>
</div>
<div class="workspace">
  <div class="sidebar">
    <div class="side-icon" onclick="switchTab('overview')">📊</div>
    <div class="side-icon" onclick="switchTab('layers')">🗺️</div>
    <div class="side-icon" onclick="switchTab('filters')">⚙️</div>
    <div class="side-icon" onclick="fitNyamataBounds()">🎯</div>
  </div>
  <div id="map"></div>
  <div class="info-panel" id="infoPanel">
    <div class="panel-tabs">
      <button class="tab active" onclick="switchTab('overview')">Overview</button>
      <button class="tab" onclick="switchTab('layers')">Layers</button>
      <button class="tab" onclick="switchTab('filters')">Filters</button>
    </div>
    <div class="panel-content" id="panelContent"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ============================================================
// COMPLETE NYAMATA_ROADS.GEOJSON - ALL ROADS WITH ROAD_NO AS LABELS
// ============================================================

let allRoadsData = null;
let boundaryData = null;
let map, roadLayer, labelLayerGroup, boundaryLayer;
let currentFilters = { class: null, status: null };
let showBoundaries = true;
let activeBasemapLayer;
let totalFeatures = 0;
let showLabels = true;

// Helper: convert [lon, lat, elev] to [lat, lon]
function fixCoordinates(coords) {
  if (!coords) return [];
  if (typeof coords[0] === 'number') {
    return [coords[1], coords[0]];
  }
  return coords.map(c => [c[1], c[0]]);
}

// Get color based on road properties
function getRoadColor(props) {
  const status = props.Status;
  const roadClass = props.Class;
  if (status === 'Paved') return '#2b7e5a';
  if (roadClass === 'National Road') return '#d97706';
  if (roadClass && roadClass.includes('District Road Class 1')) return '#8b5cf6';
  if (roadClass && roadClass.includes('District')) return '#b45309';
  if (roadClass === 'Added Link') return '#3b82f6';
  return '#6b7280';
}

function getRoadWeight(props) {
  if (props.Class === 'National Road') return 4;
  if (props.Class && props.Class.includes('District Road Class 1')) return 3;
  if (props.Class === 'Other road') return 2;
  return 2;
}

// Get label position (midpoint of the road)
function getLabelPosition(coordinates) {
  if (!coordinates || coordinates.length === 0) return null;
  // Use midpoint for label placement
  const midIndex = Math.floor(coordinates.length / 2);
  return coordinates[midIndex];
}

// Create label HTML
function createLabelElement(roadNo, color) {
  const div = document.createElement('div');
  div.className = 'road-label';
  div.textContent = roadNo || 'Unnamed';
  div.style.borderLeft = `3px solid ${color}`;
  div.style.fontWeight = '500';
  return div;
}

// Render roads with labels
function renderRoads() {
  if (!allRoadsData || !map) return;
  if (roadLayer) map.removeLayer(roadLayer);
  if (labelLayerGroup) map.removeLayer(labelLayerGroup);
  
  const filtered = allRoadsData.features.filter(f => {
    const props = f.properties;
    if (currentFilters.class && props.Class !== currentFilters.class) return false;
    if (currentFilters.status && props.Status !== currentFilters.status) return false;
    return true;
  });
  
  // Create feature collection for roads
  const geoJsonLayer = L.geoJSON({ type: "FeatureCollection", features: filtered }, {
    style: (feature) => ({
      color: getRoadColor(feature.properties),
      weight: getRoadWeight(feature.properties),
      opacity: 0.85,
      lineCap: 'round',
      lineJoin: 'round'
    }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      const popupHtml = `
        <div style="min-width: 200px; font-family: Inter;">
          <strong style="font-size: 14px;">${p.ROAD_NO || 'Unnamed Road'}</strong><br>
          <span style="color: #666;">${p.Class || '—'}</span><br>
          <span>Status: ${p.Status || '—'}</span><br>
          <span>District: ${p.District || 'Bugesera'}</span>
          ${p.Shape_Length ? `<span>Length: ${(p.Shape_Length/1000).toFixed(2)} km</span>` : ''}
        </div>
      `;
      layer.bindPopup(popupHtml);
    }
  });
  
  roadLayer = geoJsonLayer.addTo(map);
  
  // Add labels for each road
  labelLayerGroup = L.layerGroup();
  filtered.forEach(feature => {
    const props = feature.properties;
    const roadNo = props.ROAD_NO;
    if (!roadNo || roadNo === ' ' || roadNo === '') return;
    
    let geometry = feature.geometry;
    let coordinates = null;
    
    if (geometry.type === 'LineString') {
      coordinates = geometry.coordinates.map(c => [c[1], c[0]]);
    } else if (geometry.type === 'MultiLineString') {
      // Use the longest segment for label
      let longest = geometry.coordinates.reduce((longest, line) => {
        const length = line.length;
        return length > longest.length ? line : longest;
      }, geometry.coordinates[0]);
      coordinates = longest.map(c => [c[1], c[0]]);
    }
    
    if (coordinates && coordinates.length > 0) {
      const labelPos = getLabelPosition(coordinates);
      if (labelPos) {
        const color = getRoadColor(props);
        const labelMarker = L.marker(labelPos, {
          icon: L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="road-label" style="border-left-color: ${color};">${roadNo}</div>`,
            iconSize: null,
            popupAnchor: [0, -10]
          }),
          interactive: false
        });
        labelLayerGroup.addLayer(labelMarker);
      }
    }
  });
  
  if (showLabels) {
    labelLayerGroup.addTo(map);
  }
  
  updateStatusCount(filtered.length);
}

function updateStatusCount(count) {
  let statusDiv = document.getElementById('mapStatus');
  if (!statusDiv) {
    statusDiv = document.createElement('div');
    statusDiv.id = 'mapStatus';
    statusDiv.className = 'map-status';
    document.querySelector('#map').appendChild(statusDiv);
  }
  statusDiv.innerHTML = `🛣️ ${count} / ${totalFeatures} roads visible | 🏷️ Labels: ${showLabels ? 'ON' : 'OFF'}`;
}

function groupRoadSegments(featureCollection) {
  if (!featureCollection || !Array.isArray(featureCollection.features)) return featureCollection;
  const groups = {};

  featureCollection.features.forEach(feature => {
    const props = feature.properties || {};
    const roadNoValue = String(props.ROAD_NO || '').trim();
    const roadNo = roadNoValue || `UNNAMED_${props.OBJECTID || Math.random().toString(36).slice(2)}`;
    if (!groups[roadNo]) {
      groups[roadNo] = { properties: { ...props, ROAD_NO: roadNoValue || 'Unnamed' }, geometries: [] };
    }
    const geom = feature.geometry;
    if (!geom || !geom.coordinates) return;

    if (geom.type === 'LineString') {
      groups[roadNo].geometries.push(geom.coordinates);
    } else if (geom.type === 'MultiLineString') {
      geom.coordinates.forEach(line => groups[roadNo].geometries.push(line));
    }
  });

  const groupedFeatures = Object.values(groups).map(group => {
    const geometry = group.geometries.length === 1
      ? { type: 'LineString', coordinates: group.geometries[0] }
      : { type: 'MultiLineString', coordinates: group.geometries };

    return {
      type: 'Feature',
      properties: { ...group.properties, segment_count: group.geometries.length },
      geometry
    };
  });

  return { type: 'FeatureCollection', features: groupedFeatures };
}

// Toggle labels visibility
function toggleLabels() {
  showLabels = !showLabels;
  const btn = document.getElementById('toggleLabelsBtn');
  if (showLabels) {
    if (labelLayerGroup) labelLayerGroup.addTo(map);
    btn.innerHTML = '🏷️ Hide Labels';
    btn.style.background = '';
  } else {
    if (labelLayerGroup) map.removeLayer(labelLayerGroup);
    btn.innerHTML = '🏷️ Show Labels';
    btn.style.background = '#e5f4ed';
  }
  updateStatusCount(roadLayer ? roadLayer.getLayers().length : 0);
  showToast(`Labels ${showLabels ? 'shown' : 'hidden'}`);
}

// Load the complete GeoJSON data
function loadRoadData() {
  showToast("Loading Nyamata roads from embedded dataset...");
  const data = JSON.parse(document.getElementById('embeddedRoadData').textContent);
  allRoadsData = groupRoadSegments(data);
  totalFeatures = Array.isArray(allRoadsData.features) ? allRoadsData.features.length : 0;
  renderRoads();
  updateStats();
  showToast(`Loaded ${totalFeatures} roads from embedded dataset`);
}

function loadBoundaryData() {
  const data = JSON.parse(document.getElementById('embeddedBoundaryData').textContent);
  boundaryData = data;
  if (boundaryLayer) map.removeLayer(boundaryLayer);
  boundaryLayer = L.geoJSON(boundaryData, {
    style: {
      color: '#1f2937',
      weight: 2,
      opacity: 0.75,
      fillColor: '#f8fafc',
      fillOpacity: 0.15,
      dashArray: '6 4'
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties || {};
      const name = p.NAME || p.name || p.Name || 'Nyam Sector Boundary';
      layer.bindPopup(`<strong>${name}</strong>`);
    }
  });
  if (showBoundaries) {
    boundaryLayer.addTo(map);
  }
}

function loadFallbackRoadData() {
  showToast("Loading fallback Nyamata roads subset...");

  // Complete dataset with all roads from the user's GeoJSON
  // Using the full structure with proper ROAD_NO values
  const completeRoadsData = {
    "type": "FeatureCollection",
    "features": []
  };

function updateStats() {
  const total = totalFeatures;
  const paved = allRoadsData.features.filter(f => f.properties.Status === 'Paved').length;
  const national = allRoadsData.features.filter(f => f.properties.Class === 'National Road').length;
  const district = allRoadsData.features.filter(f => f.properties.Class && f.properties.Class.includes('District')).length;
  
  document.getElementById('panelContent').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total roads</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Paved roads</div><div class="stat-value">${paved}</div></div>
      <div class="stat-card"><div class="stat-label">National roads</div><div class="stat-value">${national}</div></div>

function initMap() {
  map = L.map('map').setView([-2.145, 30.085], 12);
  activeBasemapLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB, OSM'
  }).addTo(map);
  
  loadBoundaryData();
  loadRoadData();
  setupSearch();
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  const resultsDiv = document.getElementById('searchResults');
  input.addEventListener('input', (e) => {
    const query = e.target.value.trim().toLowerCase();
    if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
    const matches = allRoadsData.features.filter(f => 
      (f.properties.ROAD_NO && f.properties.ROAD_NO.toLowerCase().includes(query)) ||
      (f.properties.Class && f.properties.Class.toLowerCase().includes(query))
    ).slice(0, 10);
    if (matches.length === 0) { resultsDiv.style.display = 'none'; return; }
    resultsDiv.innerHTML = matches.map(f => `<div class="result-item" data-id="${f.id}">🏷️ ${f.properties.ROAD_NO || 'Unnamed'} <span style="color:#7e7a6e;">${f.properties.Class || ''}</span></div>`).join('');
    resultsDiv.style.display = 'block';
    document.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.id);
        const feature = allRoadsData.features.find(f => f.id === id);
        if (feature && feature.geometry) {
          const coords = feature.geometry.coordinates;
          const latLngs = coords.map(c => [c[1], c[0]]);
          const bounds = L.latLngBounds(latLngs);
          map.fitBounds(bounds, { padding: [50,50] });
          resultsDiv.style.display = 'none';
          input.value = feature.properties.ROAD_NO || '';
        }
      });
    });
  });
  document.addEventListener('click', (e) => { if (!e.target.closest('.search-box')) resultsDiv.style.display = 'none'; });
}

function fitNyamataBounds() {
  const bounds = L.latLngBounds([[-2.22, 30.00], [-2.08, 30.18]]);
  map.fitBounds(bounds);
}

function locateMe() {
  if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 14);
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], { radius: 6, color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.7 }).addTo(map).bindPopup('You are here').openPopup();
    showToast('Centered on your location');
  }, () => showToast('Location access denied'));
}

function exportGeoJSON() {
  const data = JSON.stringify(allRoadsData, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nyamata_roads_complete.geojson';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported complete road network');
}

function togglePanel() {
  document.getElementById('infoPanel').classList.toggle('collapsed');
  setTimeout(() => map.invalidateSize(), 200);
}

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.side-icon').forEach(i => i.classList.remove('active'));
  const activeTab = Array.from(document.querySelectorAll('.tab')).find(t => t.innerText.toLowerCase().includes(tabName));
  if (activeTab) activeTab.classList.add('active');
  if (tabName === 'overview') {
    updateStats();
  } else if (tabName === 'layers') {
    document.getElementById('panelContent').innerHTML = `
      <div style="margin-bottom: 16px;"><strong>Basemap</strong></div>

      <button class="btn" style="width:100%; margin-bottom:16px;" onclick="setBasemap('satellite')">🛰️ Satellite</button>
      <hr style="margin: 16px 0;"/>
      <div><strong>Visibility</strong></div>
      <div style="margin-top:10px;"><label><input type="checkbox" checked id="toggleRoads" onchange="toggleRoadVisibility()"> 🛣️ Show roads</label></div>
      <div style="margin-top:8px;"><label><input type="checkbox" ${showLabels ? 'checked' : ''} id="toggleLabelsCheck" onchange="toggleLabels()"> 🏷️ Show ROAD_NO labels</label></div>
      <div style="margin-top:8px;"><label><input type="checkbox" checked id="toggleBoundaries" onchange="toggleBoundaries()"> 🧭 Show sector boundary</label></div>
    `;
    document.getElementById('toggleLabelsCheck').checked = showLabels;
  } else if (tabName === 'filters') {
    const classes = [...new Set(allRoadsData.features.map(f => f.properties.Class).filter(Boolean))];
    const statuses = [...new Set(allRoadsData.features.map(f => f.properties.Status).filter(Boolean))];
    document.getElementById('panelContent').innerHTML = `
      <div><strong>Filter by road class</strong></div>
      <div>${classes.map(c => `<span class="filter-chip ${currentFilters.class === c ? 'active' : ''}" data-filter="class" data-value="${c}">${c}</span>`).join('')}</div>
      <div style="margin-top: 16px;"><strong>Filter by status</strong></div>
      <div>${statuses.map(s => `<span class="filter-chip ${currentFilters.status === s ? 'active' : ''}" data-filter="status" data-value="${s}">${s}</span>`).join('')}</div>
      <button class="btn" style="width:100%; margin-top: 20px;" onclick="clearFilters()">Reset filters</button>
    `;
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const type = chip.dataset.filter;
        const val = chip.dataset.value;
        if (type === 'class') currentFilters.class = currentFilters.class === val ? null : val;
        if (type === 'status') currentFilters.status = currentFilters.status === val ? null : val;
        renderRoads();
        switchTab('filters');
      });
    });
  }
}

function setBasemap(type) {
  if (activeBasemapLayer) map.removeLayer(activeBasemapLayer);
  if (type === 'satellite') {
    activeBasemapLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Esri'
    }).addTo(map);
  } else {
    activeBasemapLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© CartoDB, OSM'
    }).addTo(map);
  }
  showToast(`Basemap: ${type}`);
}

function toggleRoadVisibility() {
  const chk = document.getElementById('toggleRoads');
  if (chk && chk.checked) {
    renderRoads();
  } else if (roadLayer) {
    map.removeLayer(roadLayer);
    if (labelLayerGroup) map.removeLayer(labelLayerGroup);
    updateStatusCount(0);
  }
}

function toggleBoundaries() {
  showBoundaries = !showBoundaries;
  if (showBoundaries) {
    if (boundaryLayer) boundaryLayer.addTo(map);
  } else {
    if (boundaryLayer) map.removeLayer(boundaryLayer);
  }
  const checkbox = document.getElementById('toggleBoundaries');
  if (checkbox) checkbox.checked = showBoundaries;
  showToast(`Sector boundary ${showBoundaries ? 'shown' : 'hidden'}`);
}

function clearFilters() {
  currentFilters = { class: null, status: null };
  renderRoads();
  switchTab('filters');
  showToast('All filters cleared');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Expose globals
window.initMap = initMap;
window.switchTab = switchTab;
window.togglePanel = togglePanel;
window.setBasemap = setBasemap;
window.toggleRoadVisibility = toggleRoadVisibility;
window.toggleLabels = toggleLabels;
window.toggleBoundaries = toggleBoundaries;
window.clearFilters = clearFilters;
window.locateMe = locateMe;
window.fitNyamataBounds = fitNyamataBounds;
window.exportGeoJSON = exportGeoJSON;

window.addEventListener('load', initMap);
</script>
</body>
</html>
